{% extends 'base.html' %}

{% block title %}Share a Post — BRFN{% endblock %}

{% block content %}
<div style="max-width:540px; margin:0 auto; background:white; padding:1.5rem; border-radius:8px;">
    <h2 style="margin-bottom:1rem;">Share with the Community</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div style="margin-bottom:0.9rem;">
                <label style="display:block; margin-bottom:0.3rem;">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p style="color:red; font-size:0.85rem;">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}
        <div style="display:flex; gap:1rem;">
            <button type="submit" class="btn btn-green">Post</button>
            <a href="/community/" class="btn" style="background:#ccc;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
